services:
  - type: web
    name: doc-analysis-api
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn src.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: API_SECRET_KEY
        sync: false
    autoDeploy: true
